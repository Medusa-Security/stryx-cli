    fixed_version: "3.5.0"
    severity: "medium"
    description: "XSS vulnerability in jQuery's html() method when passing untrusted HTML"
    reference: "https://nvd.nist.gov/vuln/detail/CVE-2020-11022"
    cwe: "CWE-79"
